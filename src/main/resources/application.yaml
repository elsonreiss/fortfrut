spring:
    datasource:
        url: jdbc:h2:mem:testdb
        driver-class-name: org.h2.Driver
        username: sa
        password:

    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: update
        show-sql: true

    h2:
      console:
        enabled: true
        path: /h2-console

    apidoc:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger.ui-html  #Caminho: http://localhost:8080/swagger-ui.html
      operationsSorter: method
      tagsSorter: alpha
